<!--
  Placeholder do Hero (1600x1200, 4:3).
  Para produńŃo: substitua por um arquivo raster (.jpg/.webp/.avif)  somente
  raster permite que o <Image /> do astro:assets gere variantes responsivas
  otimizadas (AVIF/WebP, srcset). Ao trocar, ajuste o import em Hero.astro.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" width="1600" height="1200">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1200" fill="url(#g)"/>
  <circle cx="1200" cy="400" r="180" fill="#94a3b8" opacity="0.25"/>
  <circle cx="400" cy="850" r="240" fill="#cbd5e1" opacity="0.18"/>
  <text x="800" y="620" text-anchor="middle" font-family="system-ui, sans-serif" font-size="64" font-weight="700" fill="#e2e8f0">
    Imagem Hero
  </text>
</svg>
